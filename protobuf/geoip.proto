syntax = "proto3";
package v2ray.core.app.geoip;
option go_package = "github.com/v2fly/v2ray-core/v5/app/geoip";

message GeoIPList {
  repeated GeoIP entry = 1;
}

message GeoIP {
  string country_code = 1;
  repeated CIDR cidr = 2;
  string resource_id = 3;
}

message CIDR {
  bytes ip = 1;
  uint32 prefix = 2;
}
