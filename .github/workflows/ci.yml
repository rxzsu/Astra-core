name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
        components: clippy, rustfmt

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "astra-core"
        cache-on-failure: true

    - name: Install Linux deps (TUN)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libpcap-dev

    - name: Install macOS deps (TUN)
      if: runner.os == 'macOS'
      run: brew install libpcap

    - name: Check formatting
      run: cargo fmt --all --check
      working-directory: astra-core

    - name: Build workspace
      run: cargo build --workspace --all-targets --verbose
      working-directory: astra-core

    - name: Clippy
      run: cargo clippy --workspace --all-targets --no-deps
      working-directory: astra-core

    - name: Run tests
      run: cargo test --workspace --lib --verbose --no-fail-fast
      working-directory: astra-core

    - name: Run integration tests
      run: cargo test --workspace --test '*' --verbose --no-fail-fast || true
      working-directory: astra-core
